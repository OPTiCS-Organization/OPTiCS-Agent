services:
  optics-agent:
    build: .
    image: optics-agent
    ports:
      - "${AGENT_PORT:-3001}:3001"
    volumes:
      - "./data.db:/app/data.db"
    networks:
      - service-network
    env_file: ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  optics-agent-dashboard:
    build: ../OPTiCS-Agent-Dashboard
    image: optics-agent-dashboard
    ports:
      - "${DASHBOARD_PORT:-5173}:80"
    networks:
      - service-network

networks:
  service-network: {}
